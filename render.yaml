services:
  - type: web
    name: lobster-dashboard
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lobster-dashboard-db
          property: connectionString
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: AGENT_NAME
        value: Lobster
      - key: AGENT_EMAIL
        value: agent@lobster.local
      - key: MONTHLY_BUDGET_USD
        value: 500
      - key: ENV
        value: production
      - key: SIGNOZ_DASHBOARD_URL
        sync: false

databases:
  - name: lobster-dashboard-db
    databaseName: lobster_dashboard
    user: lobster_dashboard