{% extends "base.html" %}

{% block title %}Chat - Lobster Dashboard{% endblock %}

{% block content %}
<h1 style="margin-bottom: 1rem;">Jesse ↔ Lexi Chat</h1>

<div class="card" style="margin-bottom: 1rem;">
    <div id="chat-log" style="max-height: 420px; overflow-y: auto; display: flex; flex-direction: column; gap: .5rem;">
        {% for m in messages %}
        <div data-message-id="{{ m.id }}" style="padding:.6rem .75rem; background:var(--bg-tertiary); border:1px solid var(--border); border-radius:.5rem; color:var(--text-primary);">
            <div style="font-size:.8rem; color:var(--text-muted); margin-bottom:.2rem;">{{ m.sender }} · {{ m.created_at[:19].replace('T',' ') }}</div>
            <div style="color:var(--text-primary);">{{ m.body }}</div>
        </div>
        {% endfor %}
    </div>
</div>

<div class="card">
    <form id="chat-form" style="display:grid; gap:.6rem;">
        <div style="display:flex; gap:.6rem;">
            <input id="sender" value="Jesse" style="max-width: 180px;" />
            <input id="body" placeholder="Type a message..." required style="flex:1;" />
            <button type="submit">Send</button>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
const form = document.getElementById('chat-form');
const log = document.getElementById('chat-log');

function renderMessage(m) {
  const box = document.createElement('div');
  box.style.padding = '.6rem .75rem';
  box.style.background = 'var(--bg-tertiary)';
  box.style.border = '1px solid var(--border)';
  box.style.borderRadius = '.5rem';
  box.style.color = 'var(--text-primary)';

  const meta = document.createElement('div');
  meta.style.fontSize = '.8rem';
  meta.style.color = 'var(--text-muted)';
  meta.style.marginBottom = '.2rem';
  meta.textContent = `${m.sender} · ${m.created_at.replace('T', ' ').slice(0, 19)}`;

  const body = document.createElement('div');
  body.textContent = m.body;

  box.appendChild(meta);
  box.appendChild(body);
  log.appendChild(box);
  log.scrollTop = log.scrollHeight;
}

let lastSeenId = 0;

function trackSeenFromDom() {
  const cards = Array.from(log.querySelectorAll('[data-message-id]'));
  for (const c of cards) {
    const id = Number(c.getAttribute('data-message-id') || '0');
    if (id > lastSeenId) lastSeenId = id;
  }
}

function renderMessageWithId(m) {
  const box = document.createElement('div');
  box.setAttribute('data-message-id', String(m.id || ''));
  box.style.padding = '.6rem .75rem';
  box.style.background = 'var(--bg-tertiary)';
  box.style.border = '1px solid var(--border)';
  box.style.borderRadius = '.5rem';
  box.style.color = 'var(--text-primary)';

  const meta = document.createElement('div');
  meta.style.fontSize = '.8rem';
  meta.style.color = 'var(--text-muted)';
  meta.style.marginBottom = '.2rem';
  meta.textContent = `${m.sender} · ${(m.created_at || '').replace('T', ' ').slice(0, 19)}`;

  const body = document.createElement('div');
  body.textContent = m.body;

  box.appendChild(meta);
  box.appendChild(body);
  log.appendChild(box);
  log.scrollTop = log.scrollHeight;
  if ((m.id || 0) > lastSeenId) lastSeenId = m.id;
}

async function pollNewMessages() {
  try {
    const res = await fetch('/api/chat');
    if (!res.ok) return;
    const all = await res.json();
    const fresh = (all || []).filter(m => (m.id || 0) > lastSeenId);
    fresh.forEach(renderMessageWithId);
  } catch (_) {
    // silent
  }
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const sender = document.getElementById('sender').value || 'Jesse';
  const bodyEl = document.getElementById('body');
  const body = bodyEl.value.trim();
  if (!body) return;

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sender, body })
    });

    if (!res.ok) {
      const txt = await res.text();
      alert(`Chat send failed (${res.status}). ${txt.slice(0, 160)}`);
      return;
    }

    const payload = await res.json();
    if (payload.message) renderMessageWithId(payload.message);
    if (payload.reply) renderMessageWithId(payload.reply);
    bodyEl.value = '';
    bodyEl.focus();
  } catch (err) {
    alert(`Chat send error: ${err.message}`);
  }
});

// initialize seen ids from server-rendered DOM then poll
trackSeenFromDom();
setInterval(pollNewMessages, 3000);
log.scrollTop = log.scrollHeight;
</script>
{% endblock %}
