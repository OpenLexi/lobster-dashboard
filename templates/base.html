<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Lobster Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    {% block extra_head %}{% endblock %}
</head>
<body>
    {% if request.path != "/login" %}
    <nav class="navbar">
        <div class="nav-brand">🦞 Lobster</div>
        <div class="nav-links">
            <a href="/" class="{% if request.path == '/' %}active{% endif %}">Dashboard</a>
            <a href="/tasks" class="{% if request.path == '/tasks' %}active{% endif %}">Tasks</a>
            <a href="/tokens" class="{% if request.path == '/tokens' %}active{% endif %}">Tokens</a>
            <a href="/projects" class="{% if request.path.startswith('/projects') %}active{% endif %}">Projects</a>
            <a href="/logout">Logout</a>
        </div>
    </nav>
    {% endif %}

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
